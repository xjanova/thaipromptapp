name: thaipromptapp
description: "Thaiprompt — ตลาดชุมชนไทย · Community Marketplace"
publish_to: 'none'
version: 1.0.20+21

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # HTTP + API
  dio: ^5.7.0
  dio_smart_retry: ^7.0.1
  pretty_dio_logger: ^1.4.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  # Models: hand-written fromJson/Equatable for now (see lib/shared/models/).
  # drift + freezed were dropped during Phase 5.2 because their build_runner
  # chain pinned sqlite3 < 3.0 while flutter_gemma requires sqlite3 ^3.1.
  # When we need codegen, revisit with `build_runner ^3`, `freezed ^3`,
  # `drift ^2.32+` which have moved to sqlite3 ^3.x.

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.16

  # Charts
  fl_chart: ^0.69.2

  # QR + camera
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Device + system
  device_info_plus: ^11.2.0
  package_info_plus: ^8.1.1
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0
  geolocator: ^13.0.2

  # LINE SDK (social login)
  flutter_line_sdk: ^2.7.2

  # On-device AI — Gemma 4 primary, Gemma 3 1B fallback
  # (flutter_gemma 0.13+ supports Gemma 4 E2B/E4B and Gemma3n)
  flutter_gemma: ^0.13.5

  # TTS — Piper voice models via sherpa-onnx
  sherpa_onnx: ^1.12.39

  # Utilities
  collection: ^1.19.0
  intl: ^0.20.1
  logger: ^2.5.0
  equatable: ^2.0.7
  uuid: ^4.5.1
  crypto: ^3.0.6

  # Auto-update — open downloaded APK via FileProvider
  open_filex: ^4.5.0
  url_launcher: ^6.3.1
  flutter_markdown: ^0.7.5

  # Audio playback for TTS output (Gemini TTS streams MP3 bytes)
  just_audio: ^0.9.42

  # Local SQLite — foundation for all on-device persistence:
  #   • kv_store fallback for auth token (survives flutter_secure_storage
  #     keystore corruption on Android 12+)
  #   • future: product cache, chat history, wallet snapshot, offline queue
  # Uses the platform SQLite runtime (not the `sqlite3` Dart package), so
  # it does NOT conflict with flutter_gemma's sqlite3 ^3.1 requirement.
  sqflite: ^2.3.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Branding tooling — regenerate launcher icons + native splash from
  # assets/images/logoapp*.png after any logo change:
  #   dart run flutter_launcher_icons
  #   dart run flutter_native_splash:create
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  # Codegen toolchain is intentionally absent — see `dependencies` note on
  # the freezed/drift removal. Re-introduce behind a build_runner ^3 upgrade.

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/sfx/               # 16-bit chiptune startup sound
    - assets/ai/                # Gemma model manifests
    - assets/tts/               # Piper voice manifest

  # Thai + display fonts loaded via google_fonts at runtime.
  # Custom fonts (if offline-required) go here.

# ─── Launcher icons (run: dart run flutter_launcher_icons) ──────────────────
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logoapp.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#0E2A4F"
  adaptive_icon_foreground: "assets/images/logoapp_foreground.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

# ─── Native splash (run: dart run flutter_native_splash:create) ─────────────
# Native window background shown by the OS *before* Flutter's first frame.
# After Flutter boots, lib/features/splash renders the animated splash
# (logo zoom/glow + 16-bit chiptune).
flutter_native_splash:
  color: "#0E2A4F"
  image: "assets/images/logoapp_splash.png"
  android_12:
    color: "#0E2A4F"
    image: "assets/images/logoapp_foreground.png"
    icon_background_color: "#0E2A4F"
  android: true
  ios: true
  web: false
  fullscreen: false
